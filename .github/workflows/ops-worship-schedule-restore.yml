name: Ops Worship Schedule Restore

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "list 또는 restore"
        required: true
        default: "list"
        type: choice
        options:
          - list
          - restore
      backup:
        description: "복구할 백업 폴더명 또는 전체 경로(restore 때 비우면 최신 후보)"
        required: false
        default: ""

concurrency:
  group: joych-production-ops
  cancel-in-progress: false

permissions:
  contents: read

env:
  JOYCH_APP_DIR: ${{ vars.JOYCH_APP_DIR || '/var/www/joych-homepage' }}
  JOYCH_SSH_PORT: ${{ secrets.JOYCH_SSH_PORT || '22' }}

jobs:
  worship-schedule-restore:
    name: Worship Schedule Restore
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.JOYCH_SSH_HOST }}
          SSH_USER: ${{ secrets.JOYCH_SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.JOYCH_SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.JOYCH_SSH_PASSWORD }}
        run: |
          if [[ -z "${SSH_HOST}" || -z "${SSH_USER}" ]]; then
            echo "Missing required SSH secrets." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -n "${SSH_PRIVATE_KEY}" ]]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/joych_deploy_key
            chmod 600 ~/.ssh/joych_deploy_key
          elif [[ -n "${SSH_PASSWORD}" ]]; then
            sudo apt-get update -y >/dev/null
            sudo apt-get install -y sshpass >/dev/null
          else
            echo "Missing SSH authentication." >&2
            exit 1
          fi

          ssh-keyscan -p "${JOYCH_SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Run worship schedule restore operation
        env:
          MODE: ${{ inputs.mode }}
          BACKUP: ${{ inputs.backup }}
          SSH_HOST: ${{ secrets.JOYCH_SSH_HOST }}
          SSH_USER: ${{ secrets.JOYCH_SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.JOYCH_SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.JOYCH_SSH_PASSWORD }}
        run: |
          remote_command="APP_DIR='${JOYCH_APP_DIR}' MODE='${MODE}' BACKUP='${BACKUP}' bash -s"
          cat > /tmp/worship-schedule-restore.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          APP_DIR="${APP_DIR:-/var/www/joych-homepage}"
          MODE="${MODE:-list}"
          BACKUP="${BACKUP:-}"
          BACKUP_ROOT="/var/backups/joych-homepage"

          cd "${APP_DIR}"
          if [[ -f "${APP_DIR}/.env" ]]; then
            set -a
            . "${APP_DIR}/.env"
            set +a
          fi

          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const readline = require("node:readline");
          const { spawn } = require("node:child_process");
          const mysql = require("mysql2/promise");

          const mode = process.env.MODE || "list";
          const requestedBackup = process.env.BACKUP || "";
          const backupRoot = "/var/backups/joych-homepage";
          const databaseUrl = process.env.DATABASE_URL;

          if (!databaseUrl) throw new Error("DATABASE_URL is not configured on server.");

          const parsed = new URL(databaseUrl);
          const dbName = parsed.pathname.replace(/^\//, "");
          const mysqlArgs = [
            "--host", parsed.hostname,
            "--port", parsed.port || "3306",
            "--user", decodeURIComponent(parsed.username),
            dbName,
          ];
          const mysqlEnv = {
            ...process.env,
            MYSQL_PWD: decodeURIComponent(parsed.password),
          };

          function quoteId(value) {
            return "`" + String(value).replaceAll("`", "``") + "`";
          }

          function getArchive(backupDir) {
            const gz = path.join(backupDir, "database.sql.gz");
            if (fs.existsSync(gz)) return gz;
            const sql = path.join(backupDir, "database.sql");
            if (fs.existsSync(sql)) return sql;
            return null;
          }

          async function pipePageBlocksIntoTemp(archive, tempTable) {
            await new Promise((resolve, reject) => {
              const source = archive.endsWith(".gz")
                ? spawn("gzip", ["-dc", archive])
                : spawn("cat", [archive]);
              const mysqlProc = spawn("mysql", mysqlArgs, { env: mysqlEnv, stdio: ["pipe", "ignore", "pipe"] });
              let stderr = "";
              mysqlProc.stderr.on("data", (chunk) => { stderr += chunk.toString(); });
              mysqlProc.on("error", reject);
              mysqlProc.on("close", (code) => {
                if (code === 0) resolve();
                else reject(new Error(`mysql import failed: ${stderr.slice(0, 500)}`));
              });
              source.on("error", reject);
              const rl = readline.createInterface({ input: source.stdout, crlfDelay: Infinity });
              rl.on("line", (line) => {
                if (!line.startsWith("INSERT INTO `page_blocks`")) return;
                mysqlProc.stdin.write(line.replace("INSERT INTO `page_blocks`", `INSERT INTO ${quoteId(tempTable)}`) + "\n");
              });
              rl.on("close", () => mysqlProc.stdin.end());
            });
          }

          async function loadBackupTable(conn, backupDir) {
            const archive = getArchive(backupDir);
            if (!archive) return null;
            const tempTable = `page_blocks_restore_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
            await conn.query(`CREATE TABLE ${quoteId(tempTable)} LIKE page_blocks`);
            try {
              await pipePageBlocksIntoTemp(archive, tempTable);
              return tempTable;
            } catch (error) {
              await conn.query(`DROP TABLE IF EXISTS ${quoteId(tempTable)}`).catch(() => {});
              throw error;
            }
          }

          async function findTarget(conn) {
            const [items] = await conn.query("SELECT 'item' AS kind, id, label, href FROM menu_items WHERE href = ? LIMIT 1", ["/worship/schedule"]);
            if (items.length) return items[0];
            const [subs] = await conn.query("SELECT 'sub' AS kind, id, label, href FROM menu_sub_items WHERE href = ? LIMIT 1", ["/worship/schedule"]);
            if (subs.length) return subs[0];
            throw new Error("Could not find /worship/schedule menu target.");
          }

          function conditionFor(target, alias = "") {
            const prefix = alias ? `${quoteId(alias)}.` : "";
            if (target.kind === "item") return `${prefix}\`menuItemId\` = ${Number(target.id)}`;
            return `${prefix}\`menuSubItemId\` = ${Number(target.id)}`;
          }

          async function summarize(conn, tableName, target) {
            const [rows] = await conn.query(
              `SELECT COUNT(*) AS blockCount, MIN(updatedAt) AS firstUpdatedAt, MAX(updatedAt) AS lastUpdatedAt, SUM(CHAR_LENGTH(content)) AS contentChars, SUM(content LIKE '%worship-time%') AS hasWorshipTime FROM ${quoteId(tableName)} WHERE ${conditionFor(target)}`,
            );
            return rows[0];
          }

          function listBackupDirs() {
            return fs.readdirSync(backupRoot, { withFileTypes: true })
              .filter((entry) => entry.isDirectory() && entry.name.startsWith("joych-"))
              .map((entry) => path.join(backupRoot, entry.name))
              .filter((dir) => getArchive(dir))
              .sort()
              .reverse()
              .slice(0, 12);
          }

          function resolveBackupDir(value) {
            if (!value) return null;
            if (path.isAbsolute(value)) return value;
            return path.join(backupRoot, value);
          }

          const conn = await mysql.createConnection(databaseUrl);
          try {
            const target = await findTarget(conn);
            console.log(`[target] ${target.kind} id=${target.id} label=${target.label}`);
            const current = await summarize(conn, "page_blocks", target);
            console.log(`[current] blocks=${current.blockCount} updated=${current.lastUpdatedAt} chars=${current.contentChars} worshipTime=${Number(current.hasWorshipTime || 0) > 0 ? "yes" : "no"}`);

            if (mode === "list") {
              for (const backupDir of listBackupDirs()) {
                const tempTable = await loadBackupTable(conn, backupDir);
                if (!tempTable) continue;
                try {
                  const info = await summarize(conn, tempTable, target);
                  console.log(`[backup] ${path.basename(backupDir)} blocks=${info.blockCount} updated=${info.lastUpdatedAt} chars=${info.contentChars} worshipTime=${Number(info.hasWorshipTime || 0) > 0 ? "yes" : "no"}`);
                } finally {
                  await conn.query(`DROP TABLE IF EXISTS ${quoteId(tempTable)}`);
                }
              }
              return;
            }

            if (mode !== "restore") throw new Error(`Unsupported mode: ${mode}`);

            let backupDir = resolveBackupDir(requestedBackup);
            if (!backupDir) {
              for (const candidate of listBackupDirs()) {
                const tempTable = await loadBackupTable(conn, candidate);
                if (!tempTable) continue;
                try {
                  const info = await summarize(conn, tempTable, target);
                  if (Number(info.blockCount) > 0) {
                    backupDir = candidate;
                    break;
                  }
                } finally {
                  await conn.query(`DROP TABLE IF EXISTS ${quoteId(tempTable)}`);
                }
              }
            }
            if (!backupDir || !fs.existsSync(backupDir)) throw new Error("No usable backup directory found.");

            const tempTable = await loadBackupTable(conn, backupDir);
            if (!tempTable) throw new Error("Backup database archive was not found.");
            const beforeTable = `page_blocks_before_worship_restore_${new Date().toISOString().replace(/[-:.TZ]/g, "").slice(0, 14)}`;

            await conn.beginTransaction();
            try {
              const backupInfo = await summarize(conn, tempTable, target);
              if (Number(backupInfo.blockCount) <= 0) throw new Error("Selected backup has no worship schedule blocks.");
              await conn.query(`CREATE TABLE ${quoteId(beforeTable)} LIKE page_blocks`);
              await conn.query(`INSERT INTO ${quoteId(beforeTable)} SELECT * FROM page_blocks WHERE ${conditionFor(target)}`);
              await conn.query(`DELETE FROM page_blocks WHERE ${conditionFor(target)}`);
              await conn.query(`INSERT INTO page_blocks SELECT * FROM ${quoteId(tempTable)} WHERE ${conditionFor(target)}`);
              await conn.commit();
              console.log(`[restore] backup=${path.basename(backupDir)} restoredBlocks=${backupInfo.blockCount} currentBackupTable=${beforeTable}`);
            } catch (error) {
              await conn.rollback();
              throw error;
            } finally {
              await conn.query(`DROP TABLE IF EXISTS ${quoteId(tempTable)}`);
            }
          } finally {
            await conn.end();
          }
          NODE
REMOTE_SCRIPT

          if [[ -n "${SSH_PRIVATE_KEY}" ]]; then
            ssh -i ~/.ssh/joych_deploy_key -p "${JOYCH_SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "${remote_command}" < /tmp/worship-schedule-restore.sh
          elif [[ -n "${SSH_PASSWORD}" ]]; then
            sshpass -p "${SSH_PASSWORD}" ssh -p "${JOYCH_SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "${remote_command}" < /tmp/worship-schedule-restore.sh
          else
            echo "Missing SSH authentication." >&2
            exit 1
          fi
